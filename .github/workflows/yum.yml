name: YUM Repository
run-name: Package ${{ github.event.client_payload.app_name || inputs.app_name }} ${{ github.event.client_payload.tag || inputs.tag }}

# Required secrets:
#   PACKAGES_GH_TOKEN    - PAT with public_repo scope to download release assets from other repos
#   GPG_PRIVATE_KEY      - ASCII-armored GPG private key
#   GPG_PASSPHRASE       - GPG key passphrase
#   GPG_KEY_ID           - GPG key ID used in reprepro SignWith and RPM signing
#   R2_ACCESS_KEY_ID     - Cloudflare R2 access key
#   R2_SECRET_ACCESS_KEY - Cloudflare R2 secret key
#   R2_BUCKET_NAME       - R2 bucket name (e.g. pkg-fpira-com)
#   R2_ACCOUNT_ID        - Cloudflare account ID

on:
  repository_dispatch:
    types: [new_release]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name (e.g. poof)'
        required: true
        type: string
      tag:
        description: 'Release tag (e.g. v0.7.0)'
        required: true
        type: string

concurrency:
  group: yum-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    name: Resolve inputs and load config
    runs-on: ubuntu-latest
    outputs:
      APP_NAME: ${{ steps.resolve.outputs.app_name }}
      APP_VERSION: ${{ steps.resolve.outputs.app_version }}
      SOURCE_REPO: ${{ steps.config.outputs.source_repo }}
      RESOLVED_TAG: ${{ steps.resolve.outputs.tag }}
      DESCRIPTION: ${{ steps.config.outputs.description }}
      MAINTAINER: ${{ steps.config.outputs.maintainer }}
      URL: ${{ steps.config.outputs.url }}
      CATEGORY: ${{ steps.config.outputs.category }}
      MATRIX: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve inputs from payload or workflow_dispatch
        id: resolve
        run: |
          APP_NAME="${{ github.event.client_payload.app_name || inputs.app_name }}"
          TAG="${{ github.event.client_payload.tag || inputs.tag }}"
          APP_VERSION="${TAG#v}"

          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

          echo "App:    ${APP_NAME} ${APP_VERSION}"
          echo "Source: @ ${TAG}"

      - name: Load app config
        id: config
        run: |
          CONFIG=$(grep -v '//' "configurations/${{ steps.resolve.outputs.app_name }}.jsonc" | jq -r '.')
          echo "source_repo=$(echo "$CONFIG"  | jq -r '.source_repo')"  >> "$GITHUB_OUTPUT"
          echo "description=$(echo "$CONFIG"  | jq -r '.description')"  >> "$GITHUB_OUTPUT"
          echo "maintainer=$(echo "$CONFIG"   | jq -r '.maintainer')"   >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$CONFIG"          | jq -r '.url')"          >> "$GITHUB_OUTPUT"
          echo "category=$(echo "$CONFIG"     | jq -r '.category')"     >> "$GITHUB_OUTPUT"

      - name: Load matrix
        id: matrix
        run: |
          echo "matrix=$(grep -v '//' "matrices/yum/${{ steps.resolve.outputs.app_name }}.matrix.jsonc" | jq -c '.')" >> "$GITHUB_OUTPUT"

  download_and_package:
    name: Download and package (${{ matrix.rpm_arch }})
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.checks.outputs.MATRIX) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # no need to checkout tags, we only need the binary
          # we checkout main branch to the last repo scripts and setups.
          fetch-depth: 1

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_GH_TOKEN }}
        run: |
          gh release download "${{ needs.checks.outputs.RESOLVED_TAG }}" \
            --repo "${{ needs.checks.outputs.SOURCE_REPO }}" \
            --pattern "${{ needs.checks.outputs.APP_NAME }}-*-${{ matrix.target }}.tar.gz" \
            --dir downloads/

      - name: Extract binary
        run: |
          mkdir -p binary
          tar -xzf downloads/${{ needs.checks.outputs.APP_NAME }}-*-${{ matrix.target }}.tar.gz \
            -C binary/ "${{ needs.checks.outputs.APP_NAME }}"

      - name: Setup just runner
        uses: extractions/setup-just@v3

      - name: Check glibc version compatibility
        env:
          APP_NAME: ${{ needs.checks.outputs.APP_NAME }}
        run: |
          # Maximum glibc version allowed in order to support these distros and newer:
          #   - Ubuntu 16.04 (xenial), which has glibc 2.23
          #   - Debian 9 (stretch), which has glibc 2.24
          #   - Fedora 24, which has glibc 2.23
          #   - RHEL 8 (centos 8), which has glibc 2.28
          #   - RHEL 9 (centos stream 9), which has glibc 2.34
          #   - Amazon Linux 2, which has glibc 2.26
          #   - Amazon Linux 2023, which has glibc 2.34
          GLIBC_MAX=${{ matrix.glibc_max }}

          GLIBC_ACTUAL=$(just glibc "binary/${APP_NAME}")
          echo "Binary glibc requirement: ${GLIBC_ACTUAL}"
          HIGHEST=$(printf '%s\n' "$GLIBC_MAX" "$GLIBC_ACTUAL" | sort -rV | head -n1)
          if [ "$HIGHEST" != "$GLIBC_MAX" ]; then
            echo "❌ ERROR: Binary requires glibc ${GLIBC_ACTUAL} > ${GLIBC_MAX}"
            exit 1
          fi
          echo "✅ glibc ${GLIBC_ACTUAL} <= ${GLIBC_MAX}"

      - name: Install fpm and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Create package output directories
        run: mkdir -p packages/rpm

      - name: Build .rpm packages
        env:
          APP_NAME: ${{ needs.checks.outputs.APP_NAME }}
          APP_VERSION: ${{ needs.checks.outputs.APP_VERSION }}
          MAINTAINER: ${{ needs.checks.outputs.MAINTAINER }}
          DESCRIPTION: ${{ needs.checks.outputs.DESCRIPTION }}
          URL: ${{ needs.checks.outputs.URL }}
        run: |
          for dist in el8 el9 amzn2 amzn2023; do
            fpm -s dir -t rpm \
              -n "${APP_NAME}" \
              -v "${APP_VERSION}" \
              -a "${{ matrix.rpm_arch }}" \
              --rpm-dist "${dist}" \
              --maintainer "${MAINTAINER}" \
              --description "${DESCRIPTION}" \
              --url "${URL}" \
              --license MIT \
              -p "packages/rpm/${APP_NAME}-${APP_VERSION}-1.${dist}.${{ matrix.rpm_arch }}.rpm" \
              "binary/${APP_NAME}=/usr/local/bin/${APP_NAME}"
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.checks.outputs.APP_NAME }}-packages-${{ matrix.rpm_arch }}
          path: packages/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish_yum:
    name: Publish YUM repository
    needs: [checks, download_and_package]
    runs-on: ubuntu-latest
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ needs.checks.outputs.APP_NAME }}-packages-*
          path: downloaded-packages
          merge-multiple: true

      - name: Install RPM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm createrepo-c

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure RPM macros for signing
        run: |
          cat > ~/.rpmmacros << EOF
          %_signature gpg
          %_gpg_name ${{ secrets.GPG_KEY_ID }}
          %__gpg /usr/bin/gpg
          %_gpg_digest_algo sha256
          EOF

      - name: Download existing YUM repository from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
        run: |
          mkdir -p yum
          aws s3 sync "s3://${R2_BUCKET_NAME}/yum/" yum/ \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region auto || true

      - name: Sign RPM packages
        run: |
          find downloaded-packages/rpm/ -name "*.rpm" -print0 | xargs -0 --no-run-if-empty rpm --addsign

      - name: Organize RPMs into distribution directories
        run: |
          for dist in el8 el9 amzn2 amzn2023; do
            mkdir -p "yum/${dist}/x86_64" "yum/${dist}/aarch64"
            for arch in x86_64 aarch64; do
              for rpm_file in downloaded-packages/rpm/*"${dist}"*"${arch}"*.rpm; do
                [ -f "$rpm_file" ] && cp "$rpm_file" "yum/${dist}/${arch}/"
              done
            done
          done

      - name: Generate YUM repository metadata
        run: |
          find yum/ -mindepth 2 -maxdepth 2 -type d | while read -r repo_dir; do
            createrepo_c --verbose --update "$repo_dir"
          done

      - name: Sign repository metadata
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          find yum/ -name "repomd.xml" | while read -r repomd; do
            gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
              --pinentry-mode loopback \
              --detach-sign --armor "$repomd"
          done

      - name: Export GPG public key
        run: gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > yum/gpg.pub

      - name: Sync YUM repository to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
        run: |
          aws s3 sync yum/ "s3://${R2_BUCKET_NAME}/yum/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --region auto
